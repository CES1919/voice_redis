services:
  redis:
    build:
      context: ../redis
      dockerfile: Dockerfile
    image: voice-redis:latest
    container_name: redis-streams
    volumes:
      - ../redis-data:/data
    ports:
      - "127.0.0.1:6379:6379"
    env_file:
      - ../.env
    networks:
      - shared-redis-net
    healthcheck:
      test: ["CMD", "sh", "-c", "redis-cli --user healthcheck --pass \"$$REDIS_PASS_HEALTH\" ping 2>/dev/null || redis-cli ping 2>/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  redis-init:
    image: voice-redis:latest
    container_name: redis-init
    entrypoint: ["/bin/sh", "/usr/local/bin/init_streams.sh"]
    env_file:
      - ../.env
    networks:
      - shared-redis-net
    depends_on:
      redis:
        condition: service_started
    restart: "no"

networks:
  shared-redis-net:
    name: shared-redis-net
    driver: bridge
