services:
  redis:
    build:
      context: ../redis
      dockerfile: Dockerfile
    image: voice-redis:latest
    container_name: redis-streams
    ports:
      - "127.0.0.1:6379:6379"
    env_file:
      - ../.env
    healthcheck:
      test: ["CMD", "redis-cli", "--user", "healthcheck", "--pass", "$$REDIS_PASS_HEALTH", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  redis-init:
    image: voice-redis:latest
    container_name: redis-init
    entrypoint: ["/bin/sh", "/usr/local/bin/init_streams.sh"]
    env_file:
      - ../.env
    depends_on:
      redis:
        condition: service_healthy
    restart: "no"
